- name: Build and Bind
  run: |
    # التأكد من أن المجلد anabelrat موجود
    if [ ! -d "anabelrat" ]; then
      echo "Error: anabelrat directory not found"
      ls -la
      exit 1
    fi
    
    cd anabelrat
    
    # التأكد من وجود ملفات Go
    ls -la
    
    # تثبيت الأدوات
    echo "Installing gomobile..."
    go install golang.org/x/mobile/cmd/gomobile@latest
    go install golang.org/x/mobile/cmd/gobind@latest
    
    # إضافة للـ PATH
    export PATH=$PATH:$(go env GOPATH)/bin
    
    # تهيئة go.mod إذا كان غير موجود
    if [ ! -f "go.mod" ]; then
      echo "Creating go.mod..."
      go mod init anabelrat
    fi
    
    # تنظيف المتطلبات
    go mod tidy
    
    # تهيئة gomobile
    gomobile init
    
    # البناء
    echo "Building AAR..."
    gomobile bind -target=android -androidapi 30 -v -o ../anabelrat.aar .
