name: Android Go Build
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 30
          ndk-version: 25.1.8937393

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev

      - name: Build AAR
        run: |
          cd anabelrat
          
          # Download and install gomobile
          go install golang.org/x/mobile/cmd/gomobile@latest
          go install golang.org/x/mobile/cmd/gobind@latest
          
          # Set up environment
          export PATH=$PATH:$(go env GOPATH)/bin
          export ANDROID_HOME=$ANDROID_SDK_ROOT
          export NDK_HOME=$ANDROID_SDK_ROOT/ndk/25.1.8937393
          
          # Initialize gomobile
          gomobile init -ndk=$NDK_HOME
          
          # Clean and prepare
          go mod tidy
          
          # Build AAR
          echo "Building AAR library..."
          gomobile bind -target=android -androidapi 30 -v -o ../anabelrat.aar .
          
          # Verify
          if [ -f "../anabelrat.aar" ]; then
            echo "✓ Build successful!"
            ls -lh ../anabelrat.aar
          else
            echo "✗ Build failed!"
            exit 1
          fi

      - name: Upload Artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: anabelrat-aar
          path: anabelrat.aar
          retention-days: 30
