name: Android Go Build
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23.0' # استخدام نسخة حديثة ومستقرة جداً

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Build and Bind
        run: |
          # 1. تهيئة الموديول أولاً
          go mod init anabelrat || true
          
          # 2. تثبيت الأدوات بنسخ متوافقة
          go install golang.org/x/mobile/cmd/gomobile@latest
          go install golang.org/x/mobile/cmd/gobind@latest
          
          # 3. تحميل المكتبات المطلوبة داخل المشروع يدوياً
          go get golang.org/x/mobile/bind
          go mod tidy
          
          # 4. تحديث المسارات لضمان رؤية الأدوات
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH
          export PATH=$PATH:$(go env GOPATH)/bin
          
          # 5. تهيئة gomobile
          gomobile init
          
          # 6. البناء النهائي (استخدام الفلاج -v لرؤية التفاصيل)
          gomobile bind -target=android -androidapi 30 -v -o anabelrat.aar .

      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: anabelrat-library
          path: anabelrat.aar
