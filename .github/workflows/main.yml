- name: Build and Bind
  run: |
    cd anabelrat
    
    # تثبيت الأدوات بإصدار محدد مستقر
    go install golang.org/x/mobile/cmd/gomobile@v0.0.0-20231127170105-f0e2426c4c66
    go install golang.org/x/mobile/cmd/gobind@v0.0.0-20231127170105-f0e2426c4c66
    
    # إضافة المسار للنظام
    echo "$(go env GOPATH)/bin" >> $GITHUB_PATH
    export PATH=$PATH:$(go env GOPATH)/bin
    
    # تهيئة وبناء
    gomobile init
    go mod init anabelrat || true
    go mod tidy
    
    # البناء النهائي
    gomobile bind -target=android -androidapi 30 -v -o ../anabelrat.aar .
