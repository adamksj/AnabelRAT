- name: Build and Bind
        run: |
          # 1. إنشاء الموديول أولاً في جذر المشروع
          go mod init anabelrat || true
          
          # 2. تثبيت الأدوات بنسخ محددة
          go install golang.org/x/mobile/cmd/gomobile@latest
          go install golang.org/x/mobile/cmd/gobind@latest
          
          # 3. تحديث مسار النظام
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH
          export PATH=$PATH:$(go env GOPATH)/bin
          
          # 4. تحميل مكتبة bind داخل الموديول
          go get golang.org/x/mobile/bind
          go get golang.org/x/mobile/cmd/gobind
          
          # 5. تهيئة gomobile
          gomobile init
          
          # 6. ترتيب الملفات وبناء المكتبة
          go mod tidy
          gomobile bind -target=android -androidapi 30 -v -o anabelrat.aar .
